version: 2

before:
  hooks:
    - go mod tidy

builds:
  - env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X github.com/thatjuan/cftunn/cmd.Version={{.Version}}

archives:
  - formats: [tar.gz]
    # this name template makes the OS and Arch compatible with the results of uname.
    name_template: >-
      {{ .ProjectName }}_
      {{- title .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else if eq .Arch "386" }}i386
      {{- else }}{{ .Arch }}{{ end }}
      {{- if .Arm }}v{{ .Arm }}{{ end }}
    # use zip for windows archives
    format_overrides:
      - goos: windows
        formats: [zip]

# Using `brews` (Homebrew formula) rather than the newer `homebrew_casks`:
# casks quarantine downloaded binaries via Gatekeeper, which would block our
# unsigned/un-notarized binary. The `brews` deprecation is a warning only.
brews:
  - name: cftunn
    repository:
      owner: thatjuan
      name: homebrew-tap
    homepage: "https://github.com/thatjuan/cftunn"
    description: "CLI to simplify Cloudflare Tunnel creation"
    license: "MIT"
    dependencies:
      - name: cloudflared
    test: |
      system "#{bin}/cftunn", "--version"

checksum:
  name_template: 'checksums.txt'

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'
